grammar: FHIRConnect/v0.9.0
type: model
metadata:
  name:  CLUSTER.medication.v2
  version: 0.0.1-alpha 
spec:
  system: FHIR
  version: R4
  openEhrConfig:
    archetype: openEHR-EHR-CLUSTER.medication.v2
    revision: 2.0.1
  fhirConfig:
    structureDefinition: http://hl7.org/fhir/StructureDefinition/Medication

mappings:
  - name: meta
    with:
      fhir: "$resource.meta"
      openehr: "$composition"
    manual:
      - name: "profile"
        fhir:
          - path: "profile"
            value: "http://fhir.ch/ig/ch-vacd/StructureDefinition/ch-vacd-medication-for-immunization"

  - name: "medicationName"
    with:
      fhir: "$resource.code"
      openehr: "$archetype/items[at0132]"

  - name: "medicationForm"
    with:
      fhir: "$resource.form"
      openehr: "$archetype/items[at0071]"

  - name: "feederAudit"
    with:
      fhir: "$resource"
      openehr: "$archetype/feeder_audit"
    mappingCode: "feederAudit(fhir)"